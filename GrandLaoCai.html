<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Lao Cai</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-name">
             <img src="image/logo.jpeg" class="logo">
             <a href="HomePage.html" class="name">MuongThanh</a>
        </div>
        <div class="info">
            <a href="about-us.html">About us</a>
            <a href="support.html">Supports</a>
            <a href="register.html">Register</a>
        </div>
    </header>

    <main>
        <div class="name-DN">
            Muong Thanh Grand Lao Cai Hotel
        </div>
        <div class="location">
            86 Thanh Nien Street, Lao Cai, Vietnam.
        </div>
        <div class="container">
            <div class="left-container">
                <div class="section">
                    <div class="top-section">
                        <div class="main-img">
                            <a href="image/GrandLaoCai.jpg">
                            <img src="image/GrandLaoCai.jpg">
                            </a>
                        </div>
                        <div class="right-img">
                            <a href="image/GrandLaoCai1.jpg">
                            <img src="image/GrandLaoCai1.jpg">
                            </a>
                            <a href="image/GrandLaoCai2.jpg">
                            <img src="image/GrandLaoCai2.jpg">
                            </a>
                        </div>
                    </div>
                    <div class="bottom-img">
                        <div class="bottom-img-container">
                            <a href="image/GrandLaoCai3.jpg">
                            <img src="image/GrandLaoCai3.jpg">
                            </a>
                        </div>
                        <div class="bottom-img-container">
                            <a href="image/GrandLaoCai4.jpg">
                            <img src="image/GrandLaoCai4.jpg">
                            </a>
                        </div>
                        <div class="bottom-img-container">
                            <a href="image/GrandLaoCai5.jpg">
                            <img src="image/GrandLaoCai5.jpg">
                            </a>
                        </div>
                        <div class="bottom-img-container">
                            <a href="image/GrandLaoCai6.jpg">
                            <img src="image/GrandLaoCai6.jpg">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-container">
                <table>
                    <tr>
                        <td>
                            <div class="rating-evaluation">
                                <div class="rateting-direction">
                                    <div class="rating-text">Very Good</div>
                                    <div class="reviews">106 reviews</div>
                                </div>
                                <div>
                                    <div class="rating-score">8.4</div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="room">
                                <input type="checkbox" id="room1" class="room-checkbox">
                                <div class="room-info">
                                    <label for="room1" class="room-name">Deluxe Double Room (1 Queen Bed)</label>
                                    <div class="room-options">
                                        <div style="display: flex">
                                            <div class="option-group">
                                                <label class="option-label">Number of Guests:</label>
                                                <option value="2">2</option>
                                            </div>
                                            <div class="option-group">
                                                <label for="rooms1" class="option-label">Number of Rooms:</label>
                                                <select id="rooms1" name="rooms1">
                                                    <option value="1" selected>1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                    <option value="7">7</option>
                                                    <option value="8">8</option>
                                                    <option value="9">9</option>
                                                    <option value="10">10</option>
                                                </select>
                                            </div>
                                        </div>
                                        <span class="room-price">$56/night</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="room">
                                <input type="checkbox" id="room2" class="room-checkbox">
                                <div class="room-info">
                                    <label for="room2" class="room-name">Deluxe Twin Room (2 Twin Beds)</label>
                                    <div class="room-options">
                                        <div style="display: flex">
                                            <div class="option-group">
                                                <label class="option-label">Number of Guests:</label>
                                                <option value="2" selected>2</option>
                                            </div>
                                            <div class="option-group">
                                                <label for="rooms2" class="option-label">Number of Rooms:</label>
                                                <select id="rooms2" name="rooms2">
                                                    <option value="1" selected>1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                    <option value="7">7</option>
                                                    <option value="8">8</option>
                                                    <option value="9">9</option>
                                                    <option value="10">10</option>
                                                </select>
                                            </div>
                                        </div>
                                        <span class="room-price">$56/night</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="room">
                                <input type="checkbox" id="room3" class="room-checkbox">
                                <div class="room-info">
                                    <label for="room3" class="room-name">Executive Suite (1 Queen Bed)</label>
                                    <div class="room-options">
                                        <div style="display: flex">
                                            <div class="option-group">
                                                <label class="option-label">Number of Guests:</label>
                                                    <option value="2">2</option>
                                            </div>
                                            <div class="option-group">
                                                <label for="rooms3" class="option-label">Number of Rooms:</label>
                                                <select id="rooms3" name="rooms3">
                                                    <option value="1" selected>1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                    <option value="7">7</option>
                                                    <option value="8">8</option>
                                                    <option value="9">9</option>
                                                    <option value="10">10</option>
                                                </select>
                                            </div>
                                        </div>
                                        <span class="room-price">$86/night</span>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr class="total-row">
                        <td>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <span class="total-label">Total:</span>
                                    $<span class="total-amount" id="total-amount">0</span>
                                </div>
                                <button class="pay-button" disabled">Pay</button>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </main>
</body>
