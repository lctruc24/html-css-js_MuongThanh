<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mường Thanh - Sign</title>
    <style>
        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        } 
        body {     
            background-color: #f4f6f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            background-color: white;
            border-bottom: 2px solid #ddd;
            font-family: Arial, sans-serif;
            box-shadow: 0 0 10px 5px rgba(105, 105, 105, 0.3);
            z-index: 1000;
        }

        .logo-name, .info {
            display: flex;
            align-items: center;
        }

        .logo-name {
            margin-left: 8%;
            gap: 13px;
        }

        .info {
            margin-right: 120px;
            gap: 70px;
        }

        .logo {
            height: 40px;
        }

        .name {
            font-size: 40px;
            font-weight: bold;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .info a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            font-size: 17px;
        }

        .center-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(99vh - 60px);
        }

        .container {
            display: flex;
            position: relative;
            background-color: white;
            width: 900px;
            height: 550px;
            border-radius: 20px;
            border: 1px solid #6495ED;
            box-shadow: -15px -15px 15px 5px rgba(105, 105, 105, 0.3);
            overflow: hidden;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            width: 55%; 
            transition: all 0.6s ease-in-out;
        }

        form {
            background-color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            padding: 0 50px;
            height: 100%;
        }

        input {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid rgb(222, 212, 212);
            border-radius: 7px;
            font-size: 16px;
            width: 80%;
        }

        form h1{
            margin-bottom: 30px;
        }

        form .password {
            margin-bottom: 0;
        }

        form .forgotPassword {
            margin-bottom: 10px;
            margin-right: 32px;
            font-size: 15px;
            align-self: flex-end;
            text-decoration: none;
            color: #2c72bc;
        }

        form .forgotPassword:hover {
            text-decoration: underline;
        }

        .signUp-container input {
            margin-bottom: 15px;
        }

        button {
            border-radius: 25px;
            border: 1px solid #5e5efb;
            background-color: #5e5efb;
            color: #FFFFFF;
            font-size: 13px;
            font-weight: bold;
            padding: 15px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin: 10px 0 15px 0;
        }

        .icon { 
            width: 40px; 
            height: 40px; 
            border: 1px solid #ddd; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .signIn-container {
            left: 0;
            z-index: 2;
        }

        .signUp-container {
            left: 0;
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .signIn-container {
            transform: translateX(81.81%);
            opacity: 0; 
        }

        .container.right-panel-active .signUp-container {
            transform: translateX(81.81%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        button.sign {
            background-color: transparent;
            border-color: #FFFFE0;
            color: #FFFFE0;
            margin-bottom: 150px;
            font-size: 17px;
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 55%;
            width: 45%;
            height: 100%;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            z-index: 100;
            border-radius: 150px 0 0 150px;
        }

        .container.right-panel-active .overlay-container { 
            transform: translateX(-122.22%); 
            border-radius: 0 150px 150px 0;
        }

        .overlay {
            background: url("image/sign.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            color: #FFFFE0;
            position: relative;
            left: -122.22%;
            height: 100%;
            width: 222.22%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.right-panel-active .overlay { transform: translateX(55%); }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 36%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left { transform: translateX(-20%); }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .overlay-right { right: 0; transform: translateX(0); }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }

        .flatform { display: flex; gap: 10px; margin-top: 10px; }
        
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-name">
            <img src="image/logo.jpeg" class="logo">
            <a href="HomePage.html" class="name">MuongThanh</a>
        </div>
        <div class="info">
            <a href="about-us.html">About us</a>
            <a href="Contacts.html">Contact</a>
            <a href="register.html">Register</a>
        </div>
    </header>

    <main class="center-box">
        <div class="container" id="container">

            <div class="form-container signIn-container">
                <form action="#">
                    <h1>Sign In</h1>
                    <input type="email" placeholder="Email" class="email"/>
                    <input type="password" placeholder="Password" class="password" minlength="8"/>
                    <a href="#" class="forgotPassword" >Forgot your password?</a>
                    <button>Sign In</button>
                    <div class="flatform">
                        <div class="icon"><img src="image/google-icon.png" width="30"></div>
                        <div class="icon"><img src="image/facebook-icon.png" width="30"></div>
                        <div class="icon"><img src="image/apple-icon.png" width="40"></div>
                    </div>
                </form>
            </div>

            <div class="form-container signUp-container">
                <form action="#">
                    <h1>Create Account</h1>
                    <input type="text" placeholder="Name" />
                    <input type="email" placeholder="Email" class="email" />
                    <input type="password" placeholder="Password" class="password" minlength="8"/>
                    <button>Sign Up</button>
                    <div class="flatform">
                        <div class="icon"><img src="image/google-icon.png" width="30"></div>
                        <div class="icon"><img src="image/facebook-icon.png" width="30"></div>
                        <div class="icon"><img src="image/apple-icon.png" width="40"></div>
                    </div>
                </form>
            </div>

            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1>Welcome!</h1>
                        <button class="sign" id="signIn">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1>Welcome!</h1>
                        <button class="sign" id="signUp">Sign Up</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</body>
</html>
